name: Linear Integration & Error Management

on:
  workflow_run:
    workflows: ["CI/CD Pipeline with Linear Integration"]
    types: [completed]
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed, merged]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  linear-sync:
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Sync with Linear
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { context } = require('@actions/github');
          
          // Function to create Linear issue
          async function createLinearIssue(title, description, priority = 'medium', labels = []) {
            const linearData = {
              title: title,
              description: description,
              priority: priority,
              labels: labels,
              teamId: process.env.LINEAR_TEAM_ID || 'default'
            };
            
            try {
              const response = await fetch('https://api.linear.app/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${{ secrets.LINEAR_API_KEY }}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  query: `
                    mutation CreateIssue($input: IssueCreateInput!) {
                      issueCreate(input: $input) {
                        success
                        issue {
                          id
                          number
                          title
                          url
                        }
                      }
                    }
                  `,
                  variables: {
                    input: linearData
                  }
                })
              });
              
              const result = await response.json();
              return result.data?.issueCreate?.issue;
            } catch (error) {
              console.error('Linear API Error:', error);
              return null;
            }
          }
          
          // Handle different event types
          if (context.eventName === 'workflow_run') {
            const workflowRun = context.payload.workflow_run;
            
            if (workflowRun.conclusion === 'failure') {
              // Create Linear issue for failed workflow
              const issue = await createLinearIssue(
                `🚨 CI/CD Failed: ${workflowRun.head_commit.message}`,
                `**Repository**: ${context.payload.repository.full_name}
                **Workflow**: ${workflowRun.name}
                **Commit**: ${workflowRun.head_sha}
                **Author**: ${workflowRun.head_commit.author.name}
                **Branch**: ${workflowRun.head_branch}
                
                **Error Details**:
                - Status: ${workflowRun.conclusion}
                - Started: ${workflowRun.created_at}
                - Completed: ${workflowRun.updated_at}
                
                **Action Required**:
                - [ ] Review error logs
                - [ ] Fix identified issues
                - [ ] Re-run CI/CD pipeline
                - [ ] Verify deployment success
                
                [View Workflow Run](${workflowRun.html_url})`,
                'high',
                ['ci-cd', 'bug', 'automation']
              );
              
              if (issue) {
                console.log(`Linear issue created: ${issue.url}`);
                
                // Also create GitHub issue as backup
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `🚨 CI/CD Failed - Linear: ${issue.number}`,
                  body: `CI/CD pipeline failed. Linear issue created: ${issue.url}\n\nAssigned to: ${workflowRun.head_commit.author.name}`,
                  labels: ['ci-cd', 'linear-synced'],
                  assignees: [workflowRun.head_commit.author.login]
                });
              }
            }
          }

  # Job para asignar agentes automáticamente
  auto-assign-agents:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
    - name: Auto-assign agents based on error type
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const issue = context.payload.issue;
          const title = issue.title.toLowerCase();
          const body = issue.body.toLowerCase();
          
          // Define agent assignment rules
          const agentRules = {
            'lint': ['${{ secrets.LINT_AGENT_USERNAME }}'],
            'test': ['${{ secrets.TEST_AGENT_USERNAME }}'],
            'build': ['${{ secrets.BUILD_AGENT_USERNAME }}'],
            'ci-cd': ['${{ secrets.DEVOPS_AGENT_USERNAME }}'],
            'deployment': ['${{ secrets.DEPLOY_AGENT_USERNAME }}'],
            'security': ['${{ secrets.SECURITY_AGENT_USERNAME }}']
          };
          
          // Determine issue type and assign appropriate agent
          let assignees = [];
          let labels = [...issue.labels.map(l => l.name)];
          
          for (const [type, agents] of Object.entries(agentRules)) {
            if (title.includes(type) || body.includes(type)) {
              assignees.push(...agents);
              
              if (!labels.includes(type)) {
                labels.push(type);
              }
              
              // Add priority based on issue type
              if (['ci-cd', 'security', 'deployment'].includes(type)) {
                labels.push('priority-high');
              } else if (['build', 'test'].includes(type)) {
                labels.push('priority-medium');
              } else {
                labels.push('priority-low');
              }
              break;
            }
          }
          
          // Default assignment if no specific agent found
          if (assignees.length === 0) {
            assignees.push('${{ github.repository_owner }}');
          }
          
          // Update issue with assignments and labels
          await github.rest.issues.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue.number,
            assignees: assignees.filter(Boolean), // Remove undefined values
            labels: labels
          });
          
          // Add comment with assignment info
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue.number,
            body: `🤖 **Auto-Assignment Complete**
            
            **Assigned to**: ${assignees.join(', ')}
            **Issue Type**: ${labels.filter(l => l !== 'auto-generated').join(', ')}
            **Priority**: ${labels.find(l => l.startsWith('priority-')) || 'medium'}
            
            **Next Steps**:
            1. Review error details above
            2. Investigate root cause
            3. Implement fix
            4. Test solution
            5. Close issue when resolved
            
            *This assignment was made automatically based on issue content analysis.*`
          });

  # Job para crear Linear tasks automáticas
  create-linear-tasks:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'ci-cd')
    steps:
    - name: Create automated Linear tasks
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          // Define standard tasks for CI/CD issues
          const standardTasks = [
            {
              title: "🔍 Investigate CI/CD failure",
              description: "Review logs and identify root cause of pipeline failure",
              priority: "high"
            },
            {
              title: "🔧 Implement fix for identified issue",
              description: "Develop and test solution for the identified problem",
              priority: "high"
            },
            {
              title: "✅ Verify fix with test runs",
              description: "Run tests locally and verify CI/CD pipeline passes",
              priority: "medium"
            },
            {
              title: "📋 Update documentation if needed",
              description: "Update relevant documentation based on changes made",
              priority: "low"
            },
            {
              title: "🚀 Deploy and monitor",
              description: "Deploy fix and monitor for any regression issues",
              priority: "medium"
            }
          ];
          
          // Create tasks in Linear via API
          for (const task of standardTasks) {
            try {
              const response = await fetch('https://api.linear.app/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${{ secrets.LINEAR_API_KEY }}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  query: `
                    mutation CreateIssue($input: IssueCreateInput!) {
                      issueCreate(input: $input) {
                        success
                        issue {
                          id
                          number
                          title
                        }
                      }
                    }
                  `,
                  variables: {
                    input: {
                      title: task.title,
                      description: task.description,
                      priority: task.priority,
                      labels: ['ci-cd-task', 'automated'],
                      teamId: process.env.LINEAR_TEAM_ID || 'default'
                    }
                  }
                })
              });
              
              const result = await response.json();
              if (result.data?.issueCreate?.success) {
                console.log(`Created Linear task: ${task.title}`);
              }
            } catch (error) {
              console.error(`Failed to create task: ${task.title}`, error);
            }
          }