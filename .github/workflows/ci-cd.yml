name: CI/CD Pipeline with Linear Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Define permissions for GITHUB_TOKEN
permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting with auto-fix
      run: |
        npm run lint -- --fix
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --staged --quiet || git commit -m "style: auto-fix lint issues [skip ci]"
        git push || true

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Run validation
      run: npm run validate

  # Job para manejar errores y crear issues en Linear
  handle-failure:
    runs-on: ubuntu-latest
    needs: [test]
    if: failure()
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Linear Issue for CI Failure
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { context } = require('@actions/github');
          
          // Extract error information
          const workflowRun = context.payload.workflow_run || context.runId;
          const commitMessage = context.payload.head_commit?.message || 'Unknown commit';
          const author = context.payload.head_commit?.author?.name || context.actor;
          
          // Create GitHub issue as fallback if Linear API fails
          const issueBody = `
          ## 🚨 CI/CD Pipeline Failure
          
          **Failed Workflow**: ${{ github.workflow }}
          **Commit**: \`${{ github.sha }}\`
          **Author**: ${author}
          **Branch**: ${{ github.ref_name }}
          **Commit Message**: ${commitMessage}
          
          ### Error Details
          - **Job**: test
          - **Matrix**: Node.js ${{ matrix.node-version }}
          - **Failure Type**: CI/CD Pipeline
          
          ### Action Required
          - [ ] Review failed job logs
          - [ ] Fix identified issues
          - [ ] Re-run pipeline
          - [ ] Verify all tests pass
          
          **View Logs**: [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          *Auto-generated by GitHub Actions*
          `;
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🚨 CI/CD Failed: ${commitMessage}`,
            body: issueBody,
            labels: ['bug', 'ci-cd', 'auto-generated'],
            assignees: [author] // Auto-assign to commit author
          });

    - name: Send to Linear via Webhook
      if: always()
      run: |
        curl -X POST "https://api.linear.app/webhooks/${{ secrets.LINEAR_WEBHOOK_ID }}" \
          -H "Authorization: Bearer ${{ secrets.LINEAR_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "type": "ci_failure",
            "data": {
              "title": "🚨 CI/CD Failed: ${{ github.event.head_commit.message }}",
              "description": "**Repository**: ${{ github.repository }}\n**Commit**: ${{ github.sha }}\n**Author**: ${{ github.actor }}\n**Branch**: ${{ github.ref_name }}\n**Workflow**: ${{ github.workflow }}\n\n**Action Required**: Review and fix CI/CD failures\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "priority": "high",
              "labels": ["ci-cd", "bug", "automation"],
              "assignee": "${{ github.actor }}"
            }
          }' || echo "Linear webhook failed, issue created in GitHub instead"

  # Deployment job (solo si los tests pasan)
  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: success() && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Publish to NPM
      if: success()
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create Success Notification in Linear
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          // Notify Linear of successful deployment
          const webhook = await fetch('https://api.linear.app/webhooks/${{ secrets.LINEAR_WEBHOOK_ID }}', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ${{ secrets.LINEAR_API_KEY }}',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              type: 'deployment_success',
              data: {
                title: '✅ Deployment Successful: ${{ github.event.head_commit.message }}',
                description: '**Repository**: ${{ github.repository }}\n**Version**: Published to NPM\n**Commit**: ${{ github.sha }}',
                priority: 'low',
                labels: ['deployment', 'success']
              }
            })
          });
          
          console.log('Linear notification sent:', webhook.ok ? 'Success' : 'Failed');